<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>瓜瓜池塘 - 钓鱼收集游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI Emoji", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #0a0015 0%, #1a0533 30%, #2d1b4e 60%, #4a2c6a 100%);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 18px;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .pond-title {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 5;
            letter-spacing: 4px;
        }

        .pond {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .pond-container {
            position: absolute;
            width: 90%;
            max-width: 650px;
            height: 85%;
            max-height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .sky-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                #1a0533 0%, 
                #2d1b4e 20%, 
                #4a2c6a 40%, 
                #7b4a8a 60%, 
                #a86bb9 80%,
                #d4a5d9 100%);
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            overflow: hidden;
            box-shadow: 
                0 0 80px rgba(168, 107, 185, 0.4),
                0 0 120px rgba(212, 165, 217, 0.3),
                inset 0 -20px 60px rgba(0, 0, 0, 0.3);
        }

        .stars {
            display: none;
        }

        .moon {
            display: none;
        }

        .clouds {
            display: none;
        }

        .sun-rays {
            position: absolute;
            top: -30%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse at center, 
                rgba(255, 220, 100, 0.3) 0%, 
                rgba(255, 200, 150, 0.15) 30%, 
                transparent 60%);
            animation: sunPulse 6s ease-in-out infinite;
        }

        @keyframes sunPulse {
            0%, 100% { opacity: 0.6; transform: scale(1) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.1) rotate(10deg); }
        }

        .rainbow {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 40%;
            background: linear-gradient(
                to bottom,
                transparent 0%,
                rgba(255, 0, 0, 0.1) 20%,
                rgba(255, 127, 0, 0.15) 30%,
                rgba(255, 255, 0, 0.15) 40%,
                rgba(0, 255, 0, 0.12) 50%,
                rgba(0, 0, 255, 0.12) 60%,
                rgba(75, 0, 130, 0.1) 70%,
                rgba(148, 0, 211, 0.08) 80%,
                transparent 100%
            );
            border-radius: 50%;
            filter: blur(2px);
            animation: rainbowShimmer 4s ease-in-out infinite;
        }

        @keyframes rainbowShimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .cloud {
            position: absolute;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 100%);
            border-radius: 50px;
            filter: blur(1px);
            animation: cloudFloat 20s ease-in-out infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }

        .cloud-1 {
            top: 8%;
            left: -10%;
            width: 120px;
            height: 40px;
            animation-delay: 0s;
        }

        .cloud-1::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 20px;
        }

        .cloud-1::after {
            width: 35px;
            height: 35px;
            top: -15px;
            left: 60px;
        }

        .cloud-2 {
            top: 15%;
            right: -5%;
            width: 80px;
            height: 30px;
            animation-delay: -5s;
            animation-direction: reverse;
        }

        .cloud-2::before {
            width: 35px;
            height: 35px;
            top: -18px;
            left: 15px;
        }

        .cloud-2::after {
            width: 25px;
            height: 25px;
            top: -10px;
            left: 40px;
        }

        .cloud-3 {
            top: 5%;
            right: 15%;
            width: 60px;
            height: 25px;
            animation-delay: -10s;
        }

        .cloud-3::before {
            width: 28px;
            height: 28px;
            top: -14px;
            left: 10px;
        }

        .cloud-3::after {
            width: 20px;
            height: 20px;
            top: -8px;
            left: 30px;
        }

        @keyframes cloudFloat {
            0%, 100% { transform: translateX(0) translateY(0); }
            25% { transform: translateX(10px) translateY(-5px); }
            50% { transform: translateX(5px) translateY(5px); }
            75% { transform: translateX(-5px) translateY(-3px); }
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star:nth-child(1) { top: 20%; left: 20%; animation-delay: 0s; }
        .star:nth-child(2) { top: 30%; left: 70%; animation-delay: 0.3s; }
        .star:nth-child(3) { top: 15%; left: 50%; animation-delay: 0.6s; }
        .star:nth-child(4) { top: 40%; left: 30%; animation-delay: 0.9s; }
        .star:nth-child(5) { top: 25%; left: 80%; animation-delay: 1.2s; }
        .star:nth-child(6) { top: 35%; left: 15%; animation-delay: 1.5s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .sparkle {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                radial-gradient(circle at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 2%),
                radial-gradient(circle at 60% 30%, rgba(255,255,255,0.3) 0%, transparent 2%),
                radial-gradient(circle at 40% 60%, rgba(255,255,255,0.35) 0%, transparent 2%),
                radial-gradient(circle at 70% 50%, rgba(255,255,255,0.25) 0%, transparent 2%);
            animation: sparkle 3s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .water-surface {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(180deg,
                rgba(30, 80, 120, 0.6) 0%,
                rgba(20, 60, 100, 0.8) 40%,
                rgba(10, 40, 80, 0.95) 100%);
            border-radius: 0 0 45% 45% / 0 0 40% 40%;
        }

        .water-surface::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
            animation: waterShimmer 4s ease-in-out infinite;
        }

        @keyframes waterShimmer {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        .water-ripple {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 30%;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.15);
            animation: rippleExpand 3s ease-out infinite;
        }

        .water-ripple:nth-child(2) {
            animation-delay: 1s;
        }

        .water-ripple:nth-child(3) {
            animation-delay: 2s;
        }

        @keyframes rippleExpand {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0.5; }
            100% { transform: translateX(-50%) scale(1.5); opacity: 0; }
        }

        .pond-bg {
            position: absolute;
            width: 90%;
            max-width: 600px;
            height: 80%;
            max-height: 500px;
            background: radial-gradient(ellipse at 30% 30%, #2d8a9e 0%, #1a5f7a 40%, #0d3b4c 100%);
            border-radius: 50% 45% 55% 45% / 45% 55% 45% 55%;
            box-shadow: 
                0 0 60px rgba(45, 138, 158, 0.5),
                inset 0 0 80px rgba(0, 0, 0, 0.3),
                0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .pond-bg::before {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 40%;
            height: 25%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 70%);
            border-radius: 50%;
            animation: ripple 4s ease-in-out infinite;
        }

        .pond-bg::after {
            content: '';
            position: absolute;
            bottom: 20%;
            right: 20%;
            width: 30%;
            height: 20%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: ripple 5s ease-in-out infinite 1s;
        }

        @keyframes ripple {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
        }

        .water-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, transparent 0%, rgba(255,255,255,0.05) 30%, transparent 31%),
                radial-gradient(circle at 80% 20%, transparent 0%, rgba(255,255,255,0.05) 25%, transparent 26%),
                radial-gradient(circle at 40% 40%, transparent 0%, rgba(255,255,255,0.03) 20%, transparent 21%);
            animation: wave 8s linear infinite;
        }

        @keyframes wave {
            0% { transform: translateX(0) translateY(0); }
            50% { transform: translateX(-10px) translateY(5px); }
            100% { transform: translateX(0) translateY(0); }
        }

        .bobber {
            position: absolute;
            width: 50px;
            height: 80px;
            cursor: pointer;
            z-index: 5;
            display: none;
            transition: transform 0.1s;
        }

        .bobber.visible {
            display: block;
        }

        .bobber.idle {
            animation: float 2s ease-in-out infinite;
        }

        .bobber.biting {
            animation: shake 0.15s ease-in-out infinite, bobber-red 0.3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @keyframes bobber-red {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3) saturate(1.5); }
        }

        .bobber-stem {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 35px;
            background: linear-gradient(to bottom, #2c3e50, #1a252f);
            border-radius: 0 0 3px 3px;
        }

        .bobber-stem::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #f39c12;
        }

        .bobber-emoji {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            z-index: 2;
        }

        .bobber.has-emoji .bobber-body {
            display: none;
        }

        .bobber.has-emoji .bobber-emoji {
            display: flex;
        }

        .bobber.golden .bobber-body {
            background: radial-gradient(circle at 30% 70%, #ffd700 0%, #ffb300 70%, #ff8c00 100%);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 4px 15px rgba(0, 0, 0, 0.4);
            animation: goldenGlow 1s ease-in-out infinite;
        }

        .bobber.golden.biting .bobber-body {
            background: radial-gradient(circle at 30% 70%, #ffed4a 0%, #ffd700 70%, #ffb300 100%);
            box-shadow: 0 0 40px rgba(255, 215, 0, 1), 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        @keyframes goldenGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); }
            50% { box-shadow: 0 0 50px rgba(255, 215, 0, 1); }
        }

        .bobber-body {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 70%, #ff6b6b 0%, #c0392b 70%, #922b21 100%);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4), inset 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: background 0.3s;
        }

        .bobber.biting .bobber-body {
            background: radial-gradient(circle at 30% 70%, #ff0000 0%, #cc0000 70%, #990000 100%);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .bobber-body::before {
            content: '';
            position: absolute;
            bottom: 8px;
            right: 10px;
            width: 12px;
            height: 8px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }

        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .btn {
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: pointer;
        }

        .btn-reel:disabled {
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            animation: reelBtnPulse 1.5s ease-in-out infinite;
        }

        @keyframes reelBtnPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
            50% { box-shadow: 0 0 20px rgba(231, 76, 60, 0.8); }
        }

        .btn-cast {
            background: linear-gradient(180deg, #5cb85c 0%, #449d44 100%);
            color: white;
        }

        .btn-cast:hover:not(:disabled) {
            background: linear-gradient(180deg, #6ec96e 0%, #5cb85c 100%);
        }

        .btn-reel {
            background: linear-gradient(180deg, #f44336 0%, #d32f2f 100%);
            color: white;
        }

        .btn-reel:hover:not(:disabled) {
            background: linear-gradient(180deg, #ff5252 0%, #f44336 100%);
        }

        .btn-golden {
            background: linear-gradient(180deg, #ffd700 0%, #ffb300 100%);
            color: white;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            animation: goldenPulse 1.5s ease-in-out infinite;
            position: relative;
        }

        .btn-golden.active {
            background: linear-gradient(180deg, #ffed4a 0%, #ffd700 100%);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.9);
        }

        .btn-golden.disabled {
            background: linear-gradient(180deg, #999 0%, #666 100%);
            box-shadow: none;
            animation: none;
        }

        @keyframes goldenPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.9); }
        }

        .basket {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(180deg, #ff9f43 0%, #e67e22 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
        }

        .bobber-skin-btn {
            position: fixed;
            right: 95px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            background: linear-gradient(180deg, #3498db, #2980b9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
            box-shadow: 0 4px 20px rgba(230, 126, 34, 0.5);
            transition: all 0.2s;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .basket:hover {
            transform: scale(1.1);
        }

        .basket-icon {
            font-size: 28px;
        }

        .basket-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e74c3c;
            color: white;
            font-size: 14px;
            font-weight: bold;
            min-width: 24px;
            height: 24px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .big-catch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            animation: fadeIn 0.2s ease-out;
        }

        .big-catch-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .big-catch-card {
            background: linear-gradient(180deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(255, 215, 0, 0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90vw;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .big-catch-emoji {
            font-size: 120px;
            line-height: 1.2;
            display: block;
            animation: emoji-bounce 0.5s ease-out;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
        }

        @keyframes emoji-bounce {
            0% { transform: scale(0) rotate(-10deg); }
            50% { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .big-catch-text {
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
        }

        .big-catch-subtext {
            font-size: 16px;
            color: #7f8c8d;
            margin-top: 8px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 50;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: linear-gradient(180deg, #ffffff 0%, #ecf0f1 100%);
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            0% { transform: translateY(50px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-header {
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0 10px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .modal-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .catch-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
        }

        .catch-item {
            background: white;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .catch-item:hover {
            transform: scale(1.05);
        }

        .catch-item-emoji {
            font-size: 36px;
            display: block;
        }

        .catch-item-name {
            font-size: 12px;

        function getTaskProgress(taskText, target) {
            const catches = gameState.catches;
            
            if (taskText === "提竿 1 次") {
                return Math.min(1, catches.length);
            }
            if (taskText.includes("5 条鱼")) return catches.filter(c => c.category === 'fish').length;
            if (taskText.includes("3 种水果")) {
                const fruits = catches.filter(c => ['苹果', '梨', '橘子', '柠檬', '香蕉', '西瓜', '葡萄', '草莓', '猕猴桃', '椰子', '樱桃', '桃子', '芒果', '菠萝'].includes(c.name));
                return new Set(fruits.map(f => f.name)).size;
            }
            if (taskText.includes("5 件不同物品")) return new Set(catches.map(c => c.name)).size;
            if (taskText.includes("3 只海洋生物") && taskText.includes("不重复")) {
                const marine = catches.filter(c => ['鲸鱼', '海豚', '蓝鲸', '鲨鱼', '章鱼', '鱿鱼', '龙虾', '螃蟹'].includes(c.name));
                return new Set(marine.map(m => m.name)).size;
            }
            if (taskText.includes("3 只海洋生物")) return catches.filter(c => ['鲸鱼', '海豚', '蓝鲸', '鲨鱼', '章鱼', '鱿鱼', '龙虾', '螃蟹', '海螺', '乌龟'].includes(c.name)).length;
            if (taskText.includes("2 件稀有物品")) return catches.filter(c => c.rarity === 'rare' || c.rarity === 'epic' || c.rarity === 'legendary').length;
            if (taskText.includes("连续成功提竿")) return Math.min(3, catches.length);
            if (taskText.includes("成功提竿 10 次")) return catches.length;
            if (taskText.includes("1 个垃圾")) return catches.filter(c => ['运动鞋', '靴子', '瓶子', '塑料袋', '易拉罐', '纸杯'].includes(c.name)).length;
            if (taskText.includes("雨天") && taskText.includes("2 条鱼")) return catches.filter(c => c.weather === 'rainy' && c.category === 'fish').length;
            if (taskText.includes("夜晚") && taskText.includes("2 条鱼")) return catches.filter(c => c.weather === 'night' && c.category === 'fish').length;
            if (taskText.includes("抛竿 5 次")) return gameState.castCount || 0;
            if (taskText.includes("1 个食物")) return catches.filter(c => ['汉堡', '薯条', '披萨', '冰激凌', '甜甜圈', '饼干', '爆米花', '杯子蛋糕', '蛋糕', '布丁'].includes(c.name)).length;
            if (taskText.includes("1 个电子设备")) return catches.filter(c => ['手机', '电脑', '手表', '相机', '耳机'].includes(c.name)).length;
            if (taskText.includes("2 个水果")) {
                const fruits = catches.filter(c => ['苹果', '梨', '橘子', '柠檬', '香蕉', '西瓜', '葡萄', '草莓', '猕猴桃', '椰子', '樱桃', '桃子', '芒果', '菠萝'].includes(c.name));
                return new Set(fruits.map(f => f.name)).size;
            }
            return 0;
        }

        function updateDailyTasksUI() {
            for (let i = 1; i <= 2; i++) {
                const task = gameState.dailyTasks[i-1];
                const progress = getTaskProgress(task.text, task.target);
                const target = task.target;
                const percent = Math.min(100, (progress / target) * 100);
                
                document.getElementById('task' + i + 'Content').innerHTML = task.text + ' (' + progress + '/' + target + ')';
                document.getElementById('task' + i + 'Bar').style.width = percent + '%';
                
                const btn = document.getElementById('task' + i + 'Reward');
                if (progress >= target && !task.claimed) {
                    task.completed = true;
                    btn.classList.add('claimable');
                    btn.classList.remove('claimed');
                    btn.textContent = '领取奖励';
                } else if (task.claimed) {
                    btn.classList.remove('claimable');
                    btn.classList.add('claimed');
                    btn.textContent = '已领取';
                } else {
                    btn.classList.remove('claimable', 'claimed');
                    btn.textContent = '未完成';
                }
            }
            saveGameData();
        }

            const task2 = gameState.dailyTasks[1];

                    return;

            }
            
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * dailyChallenges.length);

        function getRandomItem() {
            let items = fishItems.map(item => {
                let weight = item.weight;
                if (gameState.goldenBobberActive && (item.rarity === 'epic' || item.rarity === 'legendary')) {
                    weight = 1000;
                } else if (gameState.goldenBobberActive) {
                    weight = 0.1;
                }
                if (item.weatherBoost && item.weatherBoost.includes(gameState.weather)) {
                    weight *= 2;
                }
                return { ...item, adjustedWeight: weight };
            });
            
            const totalWeight = items.reduce((sum, item) => sum + item.adjustedWeight, 0);
            let random = Math.random() * totalWeight;
            
            for (const item of items) {
                random -= item.adjustedWeight;
                if (random <= 0) {
                    return item;
                }
            }
            return fishItems[0];
        }

        function castLine() {
            gameState.phase = "casting";
            gameState.castCount++;
            castBtn.disabled = true;
            reelBtn.disabled = true;
            
            statusText.textContent = "抛竿中...";
            
            bobber.classList.remove("biting");
            bobber.classList.add("idle");
            bobber.style.display = "block";
            bobber.style.top = "48%";
            bobber.style.opacity = "0";
            
            setTimeout(() => {
                bobber.style.transition = "all 0.5s ease-out";
                bobber.style.top = "55%";
                bobber.style.opacity = "1";
            }, 50);
            
            setTimeout(() => {
                gameState.phase = "waiting_bite";
                statusText.textContent = "等待鱼儿上钩...";
                reelBtn.disabled = false;
                
                const waitTime = 1500 + Math.random() * 8500;
                gameState.biteTimer = setTimeout(() => {
                    triggerBite();
                }, waitTime);
            }, 800);
        }

        function triggerBite() {
            if (gameState.phase !== "waiting_bite") return;
            
            gameState.phase = "biting";
            bobber.classList.remove("idle");
            bobber.classList.add("biting");
            
            statusText.textContent = "🐟 有鱼上钩了！快提竿！";
            reelBtn.disabled = false;
            
            gameState.reelTimer = setTimeout(() => {
                if (gameState.phase === "biting") {
                    failCatch();
                }
            }, 2500);
        }

        function reelLine() {
            if (gameState.phase === "waiting" || gameState.phase === "casting") {
                showToast("先抛竿才能提竿哦", "warning");
                return;
            }
            
            if (gameState.phase === "waiting_bite") {
                showToast("还没有鱼上钩呢", "warning");
                return;
            }
            
            if (gameState.phase !== "biting") {
                return;
            }
            
            if (gameState.castCount === 3) {
                gameState.phase = "reeling";
                reelBtn.disabled = true;
                showEasterEgg();
                return;
            }
            
            clearTimeout(gameState.reelTimer);
            
            gameState.phase = "reeling";
            reelBtn.disabled = true;
            
            const caughtItem = getRandomItem();
            
            if (caughtItem.specialType === "bomb") {
                showBombEffect();
                return;
            }
            
            if (caughtItem.specialType === "ghost") {
                showGhostEffect();
                return;
            }
            
            gameState.catches.push({
                ...caughtItem,
                time: Date.now(),
                weather: gameState.weather
            });
            
            gameState.collection.add(caughtItem.emoji + caughtItem.name);
            
            checkAchievements();
            updateDailyTasksUI();
            showBigCatch(caughtItem);
        }

        function failCatch() {
            gameState.phase = "failed";
            bobber.classList.remove("biting");
            bobber.classList.add("idle");
            
            if (gameState.goldenBobberActive) {
                gameState.goldenBobberActive = false;
                goldenBobberBtn.classList.remove("active");
                bobber.classList.remove("golden");
                showToast("金色鱼漂未消耗（跑鱼）", "default");
            }
            
            statusText.textContent = "鱼跑掉了… 重新抛竿吧";
            reelBtn.disabled = true;
            
            showToast("鱼跑掉了… 重新抛竿吧", "error");
            
            setTimeout(() => {
                resetGame();
            }, 1500);
        }

        function resetGame() {
            gameState.phase = "waiting";
            
            bobber.style.display = "none";
            bobber.classList.remove("biting", "idle", "golden");
            
            castBtn.disabled = false;
            reelBtn.disabled = true;
            
            if (gameState.goldenBobberActive) {
                gameState.goldenBobberActive = false;
                gameState.goldenBobberCount--;
                saveGameData();
                updateGoldenBobberButton();
                goldenBobberBtn.classList.remove("active");
            }
            
            statusText.textContent = "点击「抛竿」开始钓鱼";
        }

        function openJournal() {
            const totalItems = fishItems.length;
            const collectedCount = gameState.collection.size;
            const progressPercent = Math.round((collectedCount / totalItems) * 100);
            
            const rarityOrder = ['legendary', 'epic', 'rare', 'common'];
            const rarityNames = {
                legendary: { name: '👑 传说', class: 'legendary' },
                epic: { name: '✨ 史诗', class: 'epic' },
                rare: { name: '⭐ 稀有', class: 'rare' },
                common: { name: '🌟 普通', class: 'common' }
            };
            
            let journalHTML = `
                <div class="journal-header" style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee;">
                    <span style="font-size: 18px; font-weight: bold;">📖 图鉴收藏</span>
                    <span class="journal-progress" style="font-size: 16px; color: #3498db; font-weight: bold;">${progressPercent}% (${collectedCount}/${totalItems})</span>
                </div>
            `;
            
            for (const rarity of rarityOrder) {
                const itemsOfRarity = fishItems.filter(item => item.rarity === rarity);
                const collectedInRarity = itemsOfRarity.filter(item => gameState.collection.has(item.emoji + item.name));
                const uncollectedInRarity = itemsOfRarity.filter(item => !gameState.collection.has(item.emoji + item.name));
                
                const sortedCollected = collectedInRarity.sort((a, b) => {
                    const aTime = Math.max(...gameState.catches.filter(c => c.name === a.name).map(c => c.time || 0));
                    const bTime = Math.max(...gameState.catches.filter(c => c.name === b.name).map(c => c.time || 0));
                    return bTime - aTime;
                });
                
                const sectionInfo = rarityNames[rarity];
                
                journalHTML += `
                    <div class="journal-section">
                        <div class="journal-section-title ${sectionInfo.class}">
                            ${sectionInfo.name} (${collectedInRarity.length}/${itemsOfRarity.length})
                        </div>
                        <div class="journal-section-grid">
                `;
                
                for (const item of sortedCollected) {
                    const caughtCount = gameState.catches.filter(c => c.name === item.name).length;
                    journalHTML += `
                        <div class="journal-item">
                            <span class="emoji">${item.emoji}</span>
                            <span class="name">${item.name}</span>
                            ${caughtCount > 0 ? `<span class="count">×${caughtCount}</span>` : ''}
                        </div>
                    `;
                }
                
                for (const item of uncollectedInRarity) {
                    journalHTML += `
                        <div class="journal-item locked">
                            <span class="emoji">${item.emoji}</span>
                            <span class="name">？？？</span>
                        </div>
                    `;
                }
                
                journalHTML += `</div></div>`;
            }
            
            journalBody.innerHTML = journalHTML;
            journalOverlay.classList.add("show");
        }

        function openBasket() {
            if (gameState.catches.length === 0) {
                modalBody.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-emoji">🎣</div>
                        <div class="empty-state-text">还没有钓到任何东西</div>
                    </div>
                `;
            } else {
                const sortedCatches = [...gameState.catches].reverse();
                
                modalBody.innerHTML = `
                    <div class="catch-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px;">
                        ${sortedCatches.map(item => `
                            <div class="catch-item" style="background: white; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);">
                                <span class="catch-item-emoji" style="font-size: 36px; display: block;">${item.emoji}</span>
                                <div class="catch-item-name" style="font-size: 12px; color: #555; margin-top: 4px;">${item.name}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            modalOverlay.classList.add("show");
        }

        function closeModal() {
            modalOverlay.classList.remove("show");
        }

        function closeJournal() {
            journalOverlay.classList.remove("show");
        }

        function openAchievement() {
            renderAchievements();
            achievementOverlay.classList.add("show");
        }

        function closeAchievement() {
            achievementOverlay.classList.remove("show");
        }

        function openBobberSkin() {
            renderBobberSkins();
            bobberSkinOverlay.classList.add("show");
        }

        function closeBobberSkin() {
            bobberSkinOverlay.classList.remove("show");
        }

        function renderBobberSkins() {
            bobberSkinBody.innerHTML = '<div class="bobber-skin-grid"></div>';
            const grid = bobberSkinBody.querySelector('.bobber-skin-grid');
            
            bobberSkins.forEach(skin => {
                const isActive = currentSkin === skin.id;
                const item = document.createElement('div');
                item.className = 'bobber-skin-item' + (isActive ? ' active' : '');
                
                item.innerHTML = '<div class="bobber-skin-preview" style="font-size:36px;">' + skin.emoji + '</div>' +
                    '<div class="bobber-skin-name">' + skin.name + '</div>' +
                    '<div class="bobber-skin-check">✅</div>';
                
                item.onclick = () => selectBobberSkin(skin.id);
                grid.appendChild(item);
            });
        }

        function selectBobberSkin(skinId) {
            currentSkin = skinId;
            localStorage.setItem('bobberSkin', skinId);
            renderBobberSkins();
            applyBobberSkin();
            showToast('已切换为 ' + bobberSkins.find(s => s.id === skinId).name, 'success');
        }

        function applyBobberSkin() {
            const skin = bobberSkins.find(s => s.id === currentSkin);
            if (!skin) return;
            
            const bobber = document.getElementById('bobber');
            const bobberEmoji = bobber.querySelector('.bobber-emoji');
            const bobberStem = bobber.querySelector('.bobber-stem');
            
            if (skin.id === 'classic') {
                bobber.classList.remove('has-emoji');
            } else {
                bobber.classList.add('has-emoji');
                if (bobberEmoji) bobberEmoji.textContent = skin.emoji;
            }
            
            if (bobberStem) bobberStem.style.background = skin.stemColor;
        }

        function renderAchievements() {
            achievementBody.innerHTML = '';
            
            achievements.forEach((achievement, index) => {
                const isUnlocked = unlockedAchievements.includes(achievement.name);
                const item = document.createElement('div');
                item.className = 'achievement-item ' + (isUnlocked ? 'unlocked' : 'locked');
                
                let conditionHtml = '';
                achievement.items.forEach(emoji => {
                    const hasItem = gameState.collection.has(emoji);
                    if (isUnlocked || hasItem) {
                        conditionHtml += '<span>' + emoji + '</span>';
                    } else {
                        conditionHtml += '<span>❓</span>';
                    }
                });
                
                const icon = isUnlocked ? '🏆' : '🔒';
                const check = isUnlocked ? '✅' : '';
                item.innerHTML = '<div class="achievement-header">' +
                    '<div class="achievement-icon">' + icon + '</div>' +
                    '<div class="achievement-name">' + achievement.name + '</div>' +
                    '<div class="achievement-check">' + check + '</div>' +
                    '</div>' +
                    '<div class="achievement-condition">' + conditionHtml + '</div>';
                
                achievementBody.appendChild(item);
            });
        }

        function checkAchievements() {
            const collectionEmojis = Array.from(gameState.collection);
            
            achievements.forEach(achievement => {
                if (unlockedAchievements.includes(achievement.name)) return;
                
                const allItemsFound = achievement.items.every(item => collectionEmojis.includes(item));
                
                if (allItemsFound) {
                    unlockedAchievements.push(achievement.name);
                    localStorage.setItem('unlockedAchievements', JSON.stringify(unlockedAchievements));
                    showToast("🎉 恭喜解锁成就：【" + achievement.name + "】", "success");
                }
            });
        }

        function updateCollectionProgress() {
            const totalItems = fishItems.length;
            const collectedCount = gameState.collection.size;
            const progressPercent = Math.round((collectedCount / totalItems) * 100);
            collectionProgress.textContent = progressPercent + '%';
        }

        function closeModal() {
            modalOverlay.classList.remove("show");
        }

        function closeJournal() {
            journalOverlay.classList.remove("show");
        }

        castBtn.addEventListener("click", castLine);
        reelBtn.addEventListener("click", reelLine);
        bobber.addEventListener("click", reelLine);
        basket.addEventListener("click", openBasket);
        collectionBtn.addEventListener("click", openJournal);
        achievementBtn.addEventListener("click", openAchievement);
        achievementClose.addEventListener("click", closeAchievement);
        bobberSkinBtn.addEventListener("click", openBobberSkin);
        bobberSkinClose.addEventListener("click", closeBobberSkin);
        journalClose.addEventListener("click", closeJournal);
        modalClose.addEventListener("click", closeModal);
        weatherDisplay.addEventListener("click", changeWeather);
        
        goldenBobberBtn.addEventListener("click", () => {
            if (gameState.goldenBobberCount <= 0) {
                showToast("暂无金色鱼漂，完成每日挑战可获得", "warning");
                return;
            }
            
            gameState.goldenBobberActive = !gameState.goldenBobberActive;
            
            if (gameState.goldenBobberActive) {
                goldenBobberBtn.classList.add("active");
                bobber.classList.add("golden");
                bobber.classList.remove("has-emoji");
                showToast("✨ 金色鱼漂已激活（必出史诗/传说）", "success");
            } else {
                goldenBobberBtn.classList.remove("active");
                bobber.classList.remove("golden");
                applyBobberSkin();
                showToast("金色鱼漂已关闭", "default");
            }
        });
        
        modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });
        journalOverlay.addEventListener("click", (e) => {
            if (e.target === journalOverlay) {
                closeJournal();
            }
        });
        achievementOverlay.addEventListener("click", (e) => {
            if (e.target === achievementOverlay) {
                closeAchievement();
            }
        });
        bobberSkinOverlay.addEventListener("click", (e) => {
            if (e.target === bobberSkinOverlay) {
                closeBobberSkin();
            }
        });

        loadGameData();
        initDailyChallenge();
        applyBobberSkin();
        
        window.addEventListener("beforeunload", () => {
            saveGameData();
        });
        
        window.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                saveGameData();
            }
        });
    </script>
</body>
</html>
